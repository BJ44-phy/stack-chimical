<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- Utilisation du lien officiel pour garantir le type MIME JavaScript -->
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: white; text-align: center; }
        /* On définit une taille fixe pour éviter le rectangle blanc vide */
        #jsme_container { 
            width: 420px; 
            height: 330px; 
            margin: 0 auto; 
            border: 1px solid #999;
            background-color: #fafafa;
        }
        #output { 
            margin: 10px auto; padding: 8px; width: 400px;
            background: #eee; border: 1px solid #ccc;
            font-family: monospace; font-size: 1.1em; min-height: 1.2em;
        }
    </style>
</head>
<body>
    <strong>Dessinez votre molécule</strong>
    <div id="jsme_container"></div>
    <div style="font-size: 0.9em; margin-top: 10px;">Votre code SMILES (à copier-coller) :</div>
    <div id="output">En attente de dessin...</div>

    <script>
        // Cette fonction doit être nommée EXACTEMENT ainsi
        function jsmeOnLoad() {
            // Création de l'applet dans le div ID "jsme_container"
            window.jsmeApplet = new JSMe("jsme_container", "420px", "330px", {
                "options" : "oldlook,nocanonize"
            });

            // Détection des changements pour afficher le SMILES[cite: 1]
            window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                var smiles = event.src.smiles();
                document.getElementById("output").innerText = smiles;
            });
        }
    </script>
</body>
</html>
