<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JSME - Générateur de SMILES</title>
    <!-- Utilisation du lien officiel qui évite les erreurs de type MIME bloquantes -->
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
    <style>
        body { font-family: sans-serif; margin: 10px; background: #f8f9fa; }
        #output { 
            width: 100%; margin-top: 10px; padding: 10px; 
            background: #e9ecef; border-radius: 4px; border: 1px solid #ced4da;
            font-family: monospace; font-size: 1.2em; min-height: 1.5em;
        }
        .instruction { font-size: 0.9em; color: #555; margin-bottom: 5px; }
    </style>
</head>

<body>
    <h3>Éditeur de Molécules</h3>
    <p class="instruction">Dessinez votre molécule ci-dessous :</p>
    
    <!-- Conteneur de l'éditeur -->
    <div id="jsme_container"></div>

    <p class="instruction">Copiez le code SMILES généré ici :</p>
    <div id="output">... en attente de dessin ...</div>

    <script>
        function jsmeOnLoad() {
            // Création de l'éditeur (adapté de votre source)[cite: 1]
            window.jsmeApplet = new JSMe("jsme_container", "450px", "350px", {
                "options" : "oldlook,nocanonize"
            });

            // Mise à jour automatique de la zone de texte à copier
            window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                var smiles = event.src.smiles();
                document.getElementById("output").innerText = smiles;
            });
        }
    </script>
</body>
</html>
