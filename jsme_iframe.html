<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JSME SMILES Generator</title>
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f7f9; }
        #output_smiles { 
            margin: 10px auto; padding: 10px; width: 90%;
            background: #fff; border: 1px solid #aaa; font-weight: bold; 
        }
    </style>
</head>
<body>
    <h3>Dessinez votre molécule</h3>
    
    <!-- Zone de dessin -->
    <div id="jsme_container"></div>

    <p>Votre code SMILES (à copier-coller) :</p>
    <div id="output_smiles">Le code apparaîtra ici...</div>

    <script>
        function jsmeOnLoad() {
            // Initialisation de l'applet (adapté de votre source)[cite: 1]
            window.jsmeApplet = new JSMe("jsme_container", "420px", "330px", {
                "options" : "oldlook,nocanonize"
            });

            // Mise à jour du texte à chaque modification du dessin
            window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                var smiles = event.src.smiles();
                document.getElementById("output_smiles").innerText = smiles;
            });
        }
    </script>
</body>
</html>
