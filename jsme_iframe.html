<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; }
        #jsme_container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="jsme_container"></div>

    <script>
        function jsmeOnLoad() {
            // On attend un tout petit peu pour être sûr que JSMe est défini
            var checkJSMe = setInterval(function() {
                if (typeof JSMe !== 'undefined') {
                    clearInterval(checkJSMe);
                    
                    window.jsmeApplet = new JSMe("jsme_container", "100%", "100%", {
                        "options" : "oldlook,nocanonize"
                    });

                    window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                        var smiles = event.src.smiles();
                        window.parent.postMessage({type: "jsme_smiles_update", smiles: smiles}, "*");
                    });
                    
                    console.log("Éditeur chargé avec succès !");
                }
            }, 100); 
        }
    </script>
</body>
</html>
