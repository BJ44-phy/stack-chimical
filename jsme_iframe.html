<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editeur JSME</title>
    <!-- On utilise le lien officiel de l'author hébergé de façon permanente -->
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
</head>
<body style="margin: 0; padding: 0; background-color: white;">
    <div id="jsme_container"></div>

    <script>
        // Force l'affichage même si le chargement est lent
        function jsmeOnLoad() {
            window.jsmeApplet = new JSMe("jsme_container", "100vw", "100vh", {
                "options" : "oldlook,nocanonize"
            });

            window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                var smiles = event.src.smiles();
                if (window.parent) {
                    window.parent.postMessage({type: "jsme_smiles_update", smiles: smiles}, "*");
                }
            });
        }
    </script>
</body>
</html>
