<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- On change la source vers le serveur de l'auteur original -->
    <script type="text/javascript" src="https://peter-ertl.com/jsme/JSME_2017-08-11/jsme/jsme.nocache.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #ffffff; 
        }
        #jsme_container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="jsme_container"></div>

    <script>
        // Cette fonction est le point d'entrée obligatoire pour JSME
        function jsmeOnLoad() {
            window.jsmeApplet = new JSMe("jsme_container", "100%", "100%", {
                "options" : "oldlook,nocanonize"
            });

            // Communication avec STACK
            window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                var smiles = event.src.smiles();
                if (window.parent) {
                    window.parent.postMessage({
                        type: "jsme_smiles_update", 
                        smiles: smiles
                    }, "*");
                }
            });
        }
    </script>
</body>
</html>
