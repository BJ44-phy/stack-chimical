<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- Source officielle stable pour éviter les erreurs de type MIME -->
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: white; text-align: center; }
        #jsme_container { 
            width: 420px; height: 330px; margin: 0 auto; 
            border: 1px solid #999; background: #fff;
        }
        #output { 
            margin: 10px auto; padding: 8px; width: 400px;
            background: #f0f0f0; border: 1px solid #ccc;
            font-family: monospace; font-size: 1.1em; min-height: 1.2em;
        }
    </style>
</head>
<body>
    <strong>Dessinez votre molécule</strong>
    <div id="jsme_container"></div>
    <div style="font-size: 0.9em; margin-top: 10px;">Votre code SMILES (à copier-coller) :</div>
    <div id="output">Initialisation en cours...</div>

    <script>
        // JSME appelle cette fonction automatiquement quand il est prêt
        function jsmeOnLoad() {
            // Options de compatibilité pour éviter les blocages de stockage[cite: 1]
            window.jsmeApplet = new JSMe("jsme_container", "420px", "330px", {
                "options" : "oldlook,nocanonize,nozoom"
            });

            // Callback pour afficher le SMILES[cite: 1]
            window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                var smiles = event.src.smiles();
                document.getElementById("output").innerText = smiles;
            });
            
            document.getElementById("output").innerText = "En attente de dessin...";
        }

        // Sécurité : si l'initialisation automatique échoue, on réessaie après 1.5s
        setTimeout(function() {
            if (typeof JSMe !== 'undefined' && !window.jsmeApplet) {
                jsmeOnLoad();
            }
        }, 1500);
    </script>
</body>
</html>
