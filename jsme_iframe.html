<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>
</head>
<body>
    <div id="jsme_container"></div>
    <script>
        function jsmeOnLoad() {
            // On crée l'applet
            window.jsmeApplet = new JSMe("jsme_container", "100vw", "100vh", {
                "options" : "oldlook,nocanonize"
            });

            // On envoie les changements au parent (STACK)
            window.jsmeApplet.setCallBack("AfterStructureModified", function(event) {
                var smiles = event.src.smiles();
                parent.postMessage({type: "jsme_smiles_update", smiles: smiles}, "*");
            });
        }
    </script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #jsme_container { width: 100%; height: 100%; }
    </style>
</body>
</html>
